name: primbon_app
description: Primbon AI — perhitungan weton & kecocokan jodoh Jawa untuk pernikahan.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_logo.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/app_logo_splash.png
  android_gravity: center
  android_12:
    color: "#FFFFFF"
    image: assets/images/app_logo_splash.png
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
    - assets/images/app_logo_splash.png
